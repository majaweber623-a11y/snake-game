<!DOCTYPE html> 
 <html lang="zh-CN"> 
 <head> 
     <meta charset="UTF-8"> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
     <title>贪吃蛇 - 孟子涵特供版</title> 
     <style> 
         body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: "Microsoft YaHei", sans-serif; touch-action: manipulation; } 
         #ui { color: white; font-size: 22px; margin-bottom: 10px; text-shadow: 0 0 5px #4CAF50; } 
         canvas { background: #000; border: 3px solid #4CAF50; border-radius: 8px; box-shadow: 0 0 20px rgba(74, 175, 80, 0.4); max-width: 90vw; } 
         #controls { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 15px; margin-top: 25px; } 
         .btn { width: 70px; height: 70px; background: #4CAF50; color: white; border: none; border-radius: 50%; font-size: 28px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px #2e7d32; -webkit-tap-highlight-color: transparent; } 
         .btn:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; background: #66bb6a; } 
         .up { grid-column: 2; } .left { grid-column: 1; grid-row: 2; } .down { grid-column: 2; grid-row: 2; } .right { grid-column: 3; grid-row: 2; } 
         #music-btn { margin-top: 15px; padding: 5px 15px; background: #333; color: #4CAF50; border: 1px solid #4CAF50; border-radius: 20px; cursor: pointer; font-size: 14px; } 
         #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; } 
         #start-btn { padding: 15px 40px; background: #4CAF50; border: none; border-radius: 30px; color: white; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px #2e7d32; } 
     </style> 
 </head> 
 <body> 
     <div id="overlay"> 
         <h1 style="color: #4CAF50; margin-bottom: 20px;">贪吃蛇 - 孟子涵版</h1> 
         <button id="start-btn" onclick="startGame()">点击进入游戏 (开启音乐)</button> 
         <p style="margin-top: 20px; font-size: 14px; color: #888;">提示：进入后请确保手机未处于静音模式</p> 
     </div> 
 
     <div id="ui">得分: <span id="score">0</span> / 10</div> 
     <canvas id="game"></canvas> 
     <div id="controls"> 
         <button class="btn up" onclick="handleInput('up')">↑</button> 
         <button class="btn left" onclick="handleInput('left')">←</button> 
         <button class="btn down" onclick="handleInput('down')">↓</button> 
         <button class="btn right" onclick="handleInput('right')">→</button> 
     </div> 
     <button id="music-btn" onclick="toggleMusic()">🎵 音乐: 关</button> 
 
     <audio id="bgm" loop preload="auto"> 
         <source src="bgm.mp3" type="audio/mpeg"> 
     </audio> 
 
     <script> 
         const canvas = document.getElementById('game'); 
         const ctx = canvas.getContext('2d'); 
         const scoreEl = document.getElementById('score'); 
         const bgm = document.getElementById('bgm'); 
         const musicBtn = document.getElementById('music-btn'); 
         const gridSize = 20; const tileCount = 15; 
         canvas.width = canvas.height = gridSize * tileCount; 
 
         let snake, food, dx, dy, score, gameActive; 
         let musicPlaying = false; 
 
         function startGame() { 
             document.getElementById('overlay').style.display = 'none'; 
             toggleMusic(); // 启动音乐 
             resetGame(); // 开始游戏 
         } 
 
         // 针对微信端音频自动播放的兼容处理 
         document.addEventListener("WeixinJSBridgeReady", function () { 
             bgm.load(); 
         }, false); 
 
         function toggleMusic() { 
             if (musicPlaying) { 
                 bgm.pause(); 
                 musicBtn.innerText = "🎵 音乐: 关"; 
             } else { 
                 bgm.play().then(() => { 
                     musicBtn.innerText = "🎵 音乐: 开"; 
                 }).catch(e => { 
                     console.log("播放失败", e); 
                 }); 
             } 
             musicPlaying = !musicPlaying; 
         } 
 
         function handleInput(dir) { 
             changeDir(dir); 
         } 
 
         function resetGame() { 
             snake = [{x: 7, y: 7}, {x: 7, y: 8}]; 
             food = {x: 3, y: 3}; 
             dx = 0; dy = -1; // 默认向上走 
             score = 0; 
             scoreEl.innerText = score; 
             gameActive = true; 
             draw(); 
             setTimeout(update, 1000); // 1秒后重新开始 
         } 
 
         function changeDir(dir) { 
             if (!gameActive) return; 
             if (dir === 'up' && dy === 0) { dx = 0; dy = -1; } 
             else if (dir === 'down' && dy === 0) { dx = 0; dy = 1; } 
             else if (dir === 'left' && dx === 0) { dx = -1; dy = 0; } 
             else if (dir === 'right' && dx === 0) { dx = 1; dy = 0; } 
         } 
 
         function draw() { 
             ctx.fillStyle = 'black'; 
             ctx.fillRect(0, 0, canvas.width, canvas.height); 
 
             // 背景彩蛋：孟子涵 
             ctx.fillStyle = "rgba(76, 175, 80, 0.08)"; 
             ctx.font = "bold 50px 'Microsoft YaHei'"; 
             ctx.textAlign = "center"; 
             ctx.fillText("孟子涵", canvas.width/2, canvas.height/2 + 20); 
 
             // 画食物 
             ctx.fillStyle = '#ff4444'; 
             ctx.beginPath(); 
             ctx.arc(food.x*gridSize+gridSize/2, food.y*gridSize+gridSize/2, gridSize/2-2, 0, Math.PI*2); 
             ctx.fill(); 
             // 画蛇 
             snake.forEach((s, i) => { 
                 ctx.fillStyle = i === 0 ? '#8bc34a' : '#4CAF50'; 
                 ctx.fillRect(s.x*gridSize, s.y*gridSize, gridSize-2, gridSize-2); 
             }); 
         } 
 
         function update() { 
             if (!gameActive) return; 
             const head = { x: snake[0].x + dx, y: snake[0].y + dy }; 
             if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || 
                 snake.some(s => s.x === head.x && s.y === head.y)) { 
                 gameActive = false; showEnd(false); return; 
             } 
             snake.unshift(head); 
             if (head.x === food.x && head.y === food.y) { 
                 score++; scoreEl.innerText = score; 
                 if (score >= 10) { gameActive = false; showEnd(true); } else { placeFood(); } 
             } else { snake.pop(); } 
             draw(); 
             setTimeout(update, 200); 
         } 
 
         function placeFood() { 
             food = { x: Math.floor(Math.random()*tileCount), y: Math.floor(Math.random()*tileCount) }; 
             if (snake.some(s => s.x === food.x && s.y === food.y)) placeFood(); 
         } 
 
         function showEnd(win) { 
             ctx.fillStyle = "rgba(0,0,0,0.85)"; 
             ctx.fillRect(0, 0, canvas.width, canvas.height); 
             ctx.textAlign = "center"; 
             if (win) { 
                 ctx.fillStyle = "#FFD700"; ctx.font = "bold 28px Arial"; 
                 ctx.fillText("恭喜通关！", canvas.width/2, canvas.height/2 - 30); 
                 ctx.fillStyle = "#ff4444"; ctx.font = "bold 50px 'Microsoft YaHei'"; 
                 ctx.fillText("孟子涵", canvas.width/2, canvas.height/2 + 40); 
             } else { 
                 ctx.fillStyle = "white"; ctx.font = "24px Arial"; 
                 ctx.fillText("游戏结束", canvas.width/2, canvas.height/2); 
             } 
             // 2秒后自动重新开始 
             setTimeout(resetGame, 2000); 
         } 
 
         // 初始不再调用 resetGame，改为等待用户点击 overlay 
     </script> 
 </body> 
 </html>
